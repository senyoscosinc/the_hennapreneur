<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The Hennapreneur - Professional henna artist offering bookings, products, and design courses">
  <meta name="keywords" content="henna, tattoo, design, course, booking, products">
  <meta name="author" content="The Hennapreneur">
  <title>The Hennapreneur - Loading</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <!-- Loading Container -->
  <div class="loading-container">
    <div class="loading-content">
      <!-- Stylish Spinner -->
      <div class="henna-spinner">
        <div class="spinner-ring"></div>
        <div class="spinner-ring"></div>
        <div class="spinner-ring"></div>
        <div class="spinner-center"></div>
      </div>
      
      <!-- Typing Text -->
      <div class="typing-text" id="typingText"></div>
      
      <!-- Progress Bar -->
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
      <div class="progress-text">0%</div>
    </div>
  </div>

  <script src="./js/animations.js"></script>
</body>
</html>
